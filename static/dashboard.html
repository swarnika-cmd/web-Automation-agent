<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCli Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: rgba(17, 24, 39, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --failed: #ef4444;
            --warning: #f59e0b;
            --retry: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            padding: 24px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 5% 5%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 95% 95%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
        }

        /* Top Bar */
        header {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .logo-section h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 450px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-left: 16px;
            border-left: 2px solid var(--card-border);
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-item {
            text-align: right;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-val {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
        }

        .status-running {
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.2);
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34d399;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.2);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.2);
        }

        /* Main Workspace */
        .workspace {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 20px;
            flex-grow: 1;
            min-height: 0; /* Important for inner scroll */
        }

        /* Left Panel - Live Screen */
        .viewport-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            min-height: 0;
            position: relative;
        }

        .panel-header {
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--card-border);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--success);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px var(--success); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .screenshot-container {
            flex-grow: 1;
            background: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .screenshot-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            background-color: #0b0f19;
            transition: opacity 0.3s;
        }

        /* Right Panel - Action Logs */
        .log-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            min-height: 0;
        }

        .feed-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom Scrollbar */
        .feed-container::-webkit-scrollbar {
            width: 6px;
        }
        .feed-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .feed-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
        }
        .feed-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Log Card Cards */
        .log-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 14px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            border-left: 3px solid #6b7280;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-card.thinking { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.02); }
        .log-card.tool_call { border-left-color: var(--accent-color); background: rgba(59, 130, 246, 0.02); }
        .log-card.observation { border-left-color: var(--success); background: rgba(16, 185, 129, 0.02); }
        .log-card.retry { border-left-color: var(--retry); background: rgba(139, 92, 246, 0.02); }
        .log-card.error { border-left-color: var(--failed); background: rgba(239, 68, 68, 0.02); }

        .log-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .step-lbl {
            font-weight: 700;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .type-badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .type-badge.thinking { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .type-badge.tool_call { background: rgba(59, 130, 246, 0.15); color: var(--accent-color); }
        .type-badge.observation { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .type-badge.retry { background: rgba(139, 92, 246, 0.15); color: var(--retry); }
        .type-badge.error { background: rgba(239, 68, 68, 0.15); color: var(--failed); }

        .log-card-body {
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .log-tool-call {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #93c5fd;
            border-left: 2px solid var(--accent-color);
        }

        .log-timestamp {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        /* Glassmorphism Control Form */
        .control-form-section {
            flex-grow: 1;
            margin: 0 32px;
            max-width: 500px;
        }

        .control-form-section form {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--card-border);
            padding: 4px;
            border-radius: 10px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .control-form-section form:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .control-form-section input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 8px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        .control-form-section input::placeholder {
            color: var(--text-muted);
        }

        .control-form-section button {
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .control-form-section button:hover {
            opacity: 0.9;
        }

        .control-form-section button:active {
            transform: scale(0.97);
        }

        .control-form-section button:disabled {
            background: #374151;
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <h1><span>🤖</span> AutoCli Live Control Panel</h1>
            <div id="taskDesc" class="task-info">Waiting for a task...</div>
        </div>

        <div class="control-form-section">
            <form id="runForm" onsubmit="submitTask(event)">
                <input type="text" id="taskInput" placeholder="Enter browser automation task (e.g. Navigate to google.com)..." required>
                <button type="submit" id="runBtn">Run Task</button>
            </form>
        </div>

        <div class="header-stats">
            <div class="stat-item">
                <div class="stat-lbl">Steps</div>
                <div id="stepCount" class="stat-val">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-lbl">Time Elapsed</div>
                <div id="timeElapsed" class="stat-val">0s</div>
            </div>
            <div id="statusBadge" class="status-badge status-running">Idle</div>
        </div>
    </header>

    <div class="workspace">
        <!-- Left Panel: Live Viewport -->
        <div class="viewport-panel">
            <div class="panel-header">
                <span>LIVE BROWSER VIEWPORT</span>
                <div class="live-indicator">
                    <div class="pulse-dot"></div>
                    <span>LIVE</span>
                </div>
            </div>
            <div class="screenshot-container">
                <img id="screenshotImg" class="screenshot-img" src="/screenshot" alt="Browser screenshot viewport">
            </div>
        </div>

        <!-- Right Panel: Agent Actions -->
        <div class="log-panel">
            <div class="panel-header">
                <span>AGENT ACTION TIMELINE</span>
            </div>
            <div id="feed" class="feed-container">
                <!-- Log Cards will be appended here dynamically -->
                <div class="log-card" id="emptyState" style="text-align: center; border-left: none; padding: 40px 20px; color: var(--text-muted);">
                    Waiting for agent to start thinking...
                </div>
            </div>
        </div>
    </div>

    <script>
        let stepCounter = 0;
        let startTime = null;
        let timerInterval = null;

        const screenshotImg = document.getElementById('screenshotImg');
        const feedContainer = document.getElementById('feed');
        const emptyState = document.getElementById('emptyState');
        const stepCountEl = document.getElementById('stepCount');
        const timeElapsedEl = document.getElementById('timeElapsed');
        const taskDescEl = document.getElementById('taskDesc');
        const statusBadge = document.getElementById('statusBadge');
        
        const taskInput = document.getElementById('taskInput');
        const runBtn = document.getElementById('runBtn');

        // Function to submit a new task to the server
        async function submitTask(event) {
            event.preventDefault();
            
            // If task is running, the button functions as a Stop button
            if (statusBadge.innerText === 'running') {
                await stopTask();
                return;
            }

            const taskText = taskInput.value.trim();
            if (!taskText) return;

            runBtn.disabled = true;
            taskInput.disabled = true;
            runBtn.innerText = 'Starting...';

            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ task: taskText })
                });
                const result = await response.json();
                
                if (result.status === 'error') {
                    alert(result.message);
                    runBtn.disabled = false;
                    taskInput.disabled = false;
                    runBtn.innerText = 'Run Task';
                } else {
                    // Task started successfully
                    taskInput.value = '';
                    feedContainer.innerHTML = `
                        <div class="log-card thinking" style="border-left-color: var(--warning); background: rgba(245, 158, 11, 0.02);">
                            <div class="log-card-header">
                                <span class="step-lbl">Step 0</span>
                                <span class="type-badge thinking">thinking</span>
                            </div>
                            <div class="log-card-body">
                                Task received: "${taskText}". Initializing agent loop...
                            </div>
                        </div>
                    `;
                    stepCounter = 0;
                    stepCountEl.innerText = 0;
                    timeElapsedEl.innerText = '0s';
                    taskDescEl.innerText = taskText;
                    statusBadge.innerText = 'running';
                    statusBadge.className = 'status-badge status-running';
                    
                    // Change button to active Stop button
                    runBtn.disabled = false;
                    runBtn.innerText = 'Stop';
                    runBtn.style.backgroundColor = 'var(--failed)';
                }
            } catch (err) {
                console.error('Failed to submit task:', err);
                alert('Connection error. Failed to send task to agent.');
                runBtn.disabled = false;
                taskInput.disabled = false;
                runBtn.innerText = 'Run Task';
            }
        }

        async function stopTask() {
            runBtn.disabled = true;
            runBtn.innerText = 'Stopping...';
            try {
                const response = await fetch('/stop', {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.status !== 'success') {
                    alert(result.message || 'Error occurred while stopping.');
                    runBtn.disabled = false;
                    runBtn.innerText = 'Stop';
                }
            } catch (err) {
                console.error('Failed to stop task:', err);
                alert('Connection error. Failed to cancel task.');
                runBtn.disabled = false;
                runBtn.innerText = 'Stop';
            }
        }

        // Periodically refresh the screenshot image
        function refreshScreenshot() {
            const timestamp = new Date().getTime();
            // Pre-load the image to prevent flickering
            const tempImg = new Image();
            tempImg.onload = () => {
                screenshotImg.src = tempImg.src;
            };
            tempImg.src = '/screenshot?t=' + timestamp;
        }

        // Timer function
        function startTimer(startEpoch) {
            if (timerInterval) clearInterval(timerInterval);
            startTime = startEpoch * 1000; // convert to ms
            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const diff = Math.floor((now - startTime) / 1000);
                
                const mins = Math.floor(diff / 60);
                const secs = diff % 60;
                
                if (mins > 0) {
                    timeElapsedEl.innerText = `${mins}m ${secs}s`;
                } else {
                    timeElapsedEl.innerText = `${secs}s`;
                }
            }, 1000);
        }

        // Add an event to the timeline feed
        function addEventToTimeline(event) {
            // Remove empty state element if it exists
            const eState = document.getElementById('emptyState');
            if (eState) {
                eState.remove();
            }

            const card = document.createElement('div');
            card.className = `log-card ${event.event_type}`;

            // Heading / stats
            const timeRel = event.timestamp - (startTime / 1000);
            const timeRelStr = timeRel > 0 ? `+${timeRel.toFixed(1)}s` : '0.0s';
            
            let inner = `
                <div class="log-card-header">
                    <span class="step-lbl">Step ${event.step}</span>
                    <div>
                        <span class="log-timestamp" style="margin-right: 8px;">${timeRelStr}</span>
                        <span class="type-badge ${event.event_type}">${event.event_type}</span>
                    </div>
                </div>
                <div class="log-card-body">
            `;

            // Tool invocation args
            if (event.tool_name) {
                const argsStr = Object.entries(event.tool_args || {})
                    .map(([k, v]) => `<strong>${k}</strong>: ${JSON.stringify(v)}`)
                    .join(', ');
                inner += `<div class="log-tool-call">🔧 <code>${event.tool_name}(${argsStr})</code></div>`;
            }

            // Message text
            inner += `<p>${event.message.replace(/\n/g, '<br>')}</p></div>`;
            card.innerHTML = inner;

            feedContainer.appendChild(card);
            feedContainer.scrollTop = feedContainer.scrollHeight;

            // Trigger step updates
            if (event.step > stepCounter) {
                stepCounter = event.step;
                stepCountEl.innerText = stepCounter;
            }

            // If it contains screenshot, refresh viewport instantly
            if (event.screenshot_path || event.event_type === 'observation') {
                refreshScreenshot();
            }
        }

        // Establish WebSocket connection
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Connected to AutoCli WebSocket server');
            };

            ws.onmessage = (eventMsg) => {
                const data = JSON.parse(eventMsg.data);
                
                if (data.type === 'init') {
                    // Initialize state from existing event log
                    feedContainer.innerHTML = '';
                    stepCounter = 0;
                    stepCountEl.innerText = 0;
                    
                    taskDescEl.innerText = data.task_description || 'No active task';
                    
                    statusBadge.innerText = data.status;
                    statusBadge.className = `status-badge status-${data.status}`;
                    
                    startTimer(data.start_time);
                    
                    if (data.events && data.events.length > 0) {
                        data.events.forEach(addEventToTimeline);
                    }

                    // Adjust controls depending on running status
                    if (data.status === 'running') {
                        runBtn.disabled = false;
                        taskInput.disabled = true;
                        runBtn.innerText = 'Stop';
                        runBtn.style.backgroundColor = 'var(--failed)';
                    } else {
                        runBtn.disabled = false;
                        taskInput.disabled = false;
                        runBtn.innerText = 'Run Task';
                        runBtn.style.backgroundColor = '';
                    }
                } else if (data.type === 'event') {
                    addEventToTimeline(data.event);
                } else if (data.type === 'status') {
                    statusBadge.innerText = data.status;
                    statusBadge.className = `status-badge status-${data.status}`;
                    if (data.status !== 'running') {
                        stopTimer();
                        // Re-enable controls and restore default look
                        runBtn.disabled = false;
                        taskInput.disabled = false;
                        runBtn.innerText = 'Run Task';
                        runBtn.style.backgroundColor = '';
                    }
                }
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected. Reconnecting in 3 seconds...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket error:', err);
                ws.close();
            };
        }

        // Start screenshot refresh loop (every 1.5s as fallback/live updates)
        setInterval(refreshScreenshot, 1500);

        // Connect
        connectWebSocket();
    </script>
</body>
</html>
